<head>

  <header id="site-header">
    <h1>Cece's Demo</h1>
    <button id="schedule-now-btn">Schedule Now</button>
  </header>

  <main>
    <section id="hero">
      <h2>Hello</h2>
    </section>

    <section id="services">
      <h2>Our Services</h2>
      <div class="card-grid" id="card-grid">
        <div class="card" data-card-id="1">
          <h3>Service 1</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="learn-more">Learn More</button>
        </div>
        <div class="card" data-card-id="2">
          <h3>Service 2</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="view-portfolio">View Portfolio</button>
        </div>
        <div class="card" data-card-id="3">
          <h3>Service 3</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="show-me">Show Me</button>
        </div>
      </div>
    </section>

    <section id="signup">
      <h2>Sign Up</h2>
      <form id="demo-form">
        <input type="text" id="name" name="name" placeholder="Your name" required />
        <input type="email" id="email" name="email" placeholder="Your email" required />
        <textarea id="message" name="message" rows="3" placeholder="Message"></textarea>
        <button type="submit" id="form-submit">Submit</button>
      </form>
    </section>

    <section id="contact">
      <h2>Get in Touch</h2>
      <p>Have questions? We'd love to hear from you.</p>
      <button id="contact-us-btn" style="margin-top: 1rem;">Contact Us Now</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DemoSite</p>
  </footer>
