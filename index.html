  <header id="site-header">

    <button id="schedule-now-btn">Schedule Now</button>

  <main>
    <section id="hero">
      <h2>Hello</h2>
    </section>

    <section id="services">
      <h2>Our Services</h2>
      <div class="card-grid" id="card-grid">
        <div class="card" data-card-id="1">
          <h3>Service 1</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="learn-more">Learn More</button>
        </div>
        <div class="card" data-card-id="2">
          <h3>Service 2</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="view-portfolio">View Portfolio</button>
        </div>
        <div class="card" data-card-id="3">
          <h3>Service 3</h3>
          <p>Learn about this service.</p>
          <button class="card-cta" data-action="show-me">Show Me</button>
        </div>
      </div>
    </section>

    <section id="signup">
      <h2>Sign Up</h2>
      <form id="demo-form">
        <input type="text" id="name" name="name" placeholder="Your name" required />
        <input type="email" id="email" name="email" placeholder="Your email" required />
        <textarea id="message" name="message" rows="3" placeholder="Message"></textarea>
        <button type="submit" id="form-submit">Submit</button>
      </form>
    </section>

    <section id="contact">
      <h2>Get in Touch</h2>
      <p>Have questions? We'd love to hear from you.</p>
      <button id="contact-us-btn" style="margin-top: 1rem;">Contact Us Now</button>
    </section>

  <script>
      // function hideBanner() {
      //   console.log('hiding banner...');
      //   document.getElementById('cookie-consent-banner').style.display = 'none';
      // }
    
      function setConsent(consent) {
        const consentMode = {
          'functionality_storage': consent.necessary ? 'granted' : 'denied',
          'security_storage': consent.necessary ? 'granted' : 'denied',
          'ad_storage': consent.marketing ? 'granted' : 'denied',
          'analytics_storage': consent.analytics ? 'granted' : 'denied',
          'personalization_storage': consent.preferences ? 'granted' : 'denied'
        };
        gtag('consent', 'update', consentMode);
        localStorage.setItem('consentMode', JSON.stringify(consentMode));
      }
    
      document.addEventListener('DOMContentLoaded', function () {
        if (localStorage.getItem('consentMode') === null) {
          document.getElementById('btn-accept-all').addEventListener('click', function () {
            setConsent({ necessary: true, analytics: true, preferences: true, marketing: true });
            hideBanner();
          });
    
          document.getElementById('btn-accept-some').addEventListener('click', function () {
            setConsent({
              necessary: true,
              analytics: document.getElementById('consent-analytics').checked,
              preferences: document.getElementById('consent-preferences').checked,
              marketing: document.getElementById('consent-marketing').checked
            });
            hideBanner();
          });
    
          document.getElementById('btn-reject-all').addEventListener('click', function () {
            setConsent({ necessary: false, analytics: false, preferences: false, marketing: false });
            hideBanner();
          });
    
          document.getElementById('cookie-consent-banner').style.display = 'block';
        }
      });
    </script>
